<style>
  /* Here we used the CSS @font-face structure to upload three different Poppins fonts to our project: regular, bold, and italics. 
  It is important that the .ttf files (downloaded from Google Fonts) which contain the font information are located with the rest of our coding files. 
  Once the fonts are made avialable in this <style> block, they can be accessed in our main HTML code using style="font-family: _____;" */

  @font-face {
    font-family: "Poppins";
    src: url("Poppins-Regular.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
  }

  @font-face {
    font-family: "Poppins Bold";
    src: url("Poppins-Bold.ttf") format("truetype");
    font-weight: bold;
    font-style: normal;
  }

  @font-face {
    font-family: "Poppins Italic";
    src: url("Poppins-Italic.ttf") format("truetype");
    font-weight: normal;
    font-style: italic;

</style>

<!-- Throughout this code, we use vw (viewport width) and vh (viewport height) to size various components. We use this format because it allows components to shrink or grow if the display screen is maximized/minimized by the user. -->

          <v-app-bar-title style="font-family: Poppins;">Collective App: Maritime Commerce and Whale

          <!-- If "navDrawerOpen" is true, the navigation bar will pop open. From here, the user can click on links that take them to each of the app modules. -->
          <v-list>

            </v-list-item>

          <v-dialog persistent v-model=learnMoreOpen style="width: 85vw; height: 60vw;">
            <v-card color="white">
              <v-card-title align="center" style="font-family: Poppins;" class="ma-6">Theme & Critical Lense</v-card-title>
              <v-card-text style="font-family: Poppins;">
                This module builds on the larger website theme of whale life by exploring whale health and wellbeing. In particular, our module is focused on the role that anthropocentrism plays in perpetuating human activity that is harmful to whales. Anthropocentrism, broadly speaking, refers to the viewpoint that human life is more valuable and significant than other life forms. This viewpoint fuels extractivist and exploitative behaviour that harms the environment and animal life. 

                Drawing upon Katherine Hayles’ integrated cognitive framework (ICF), we challenge anthropocentrism by “humanizing” whales as independent actors in relation to humans. Our Jeopardy game on whale health causes users to confront the “dehumanization” of humans and simultaneous “humanization” of whales. Accordingly, users will re-learn cognition as something that is possessed by non-human species, including whales. To achieve this, the language of our Jeopardy questions will solely refer to humans by their species name, *homo sapiens*, and emphasize the “humane” character of whale health, migration, habitats, families, and communities. Additionally, instead of rewarding players with more points for selecting more difficult questions, we will reward players for choosing to confront increasingly uncomfortable topics. As questions increase in uncomfortability, the user is forced to confront topics that challenge their anthropocentric views. These questions look at shipping, pollution, and other human practices, and their impacts on whale health.

                Hayles also argues that “cognitive assemblages,” or decision-making collectives of humans, nonhumans, and computational media, determine the choices that humans make (2025). Humans are actually not as self-determining as anthropocentrism would like them to believe (Hayles, 2025). Their assumptions are formed and mediated by computational media (Hayles, 2025). As a game that has been traditionally framed as the intellectual pursuit of objective truths, Jeopardy is an example of a cognitive assemblage that impacts human decision-making. By employing Jeopardy’s epistemic authority and the anti-anthropocentric ICF, our Jeopardy module reframes whale health not as an isolated environmental tragedy but as a consequence of widespread and harmful anthropocentrism. 

                <a href="http://ebookcentral.proquest.com/lib/mcmu/detail.action?docID=31887642" target="_blank">(Hayles, 2025)</a>
              </v-card-text>

              <div class="d-flex justify-center ma-6">

                  style="font-family: Poppins; width: 10vw; height: 4vh; color: white;">Exit</v-btn>
              </div>

            </v-card>

                    3. If you select the correct answer, you'll earn the points associated with that question. If you select an incorrect answer, you won't earn any points for that question. <br> <br>
                    4. Once you've answered all 20 questions, the game will end and your total score will be displayed. Good luck! (scroll and click on exit button below)
              </v-card-text>

                        class="text-pre-wrap ma-6" v-html="item.content"> </v-card-title>

                            @click.once="validateResult(item.answerA, item.correctAnswer, item.button, item.points)"

                          <!--the buttons are disabled once the correct answer is clicked on. The disabled property becomes true once the button object (the ID) is found in the list of answeredQuestions-->
                        </v-col>
                        <v-col cols="6">
                          <v-btn color="#4E8D9C" style="font-family: Poppins; width: 35vw; height: 4vh; color: white;"
                            @click.once="validateResult(item.answerB, item.correctAnswer, item.button, item.points)"

                        </v-col>

                            @click.once="validateResult(item.answerC, item.correctAnswer, item.button, item.points)"

                        </v-col>
                        <v-col cols="6">
                          <v-btn color="#4E8D9C" style="font-family: Poppins; width: 35vw; height: 4vh; color: white;"
                            @click.once="validateResult(item.answerD, item.correctAnswer, item.button, item.points)"
                            :disabled="isAnswered(item.button)">{{item.answerD}}</v-btn>
                        </v-col>
                      </v-row>

                      </v-card-text>

                      </v-card-text>

                  <v-btn @click="toggleCardOpenClose(item)"
                    style="font-family: Poppins; width: 11vw; height: 9vh; color: white;" size="x-large"

                    <v-card color="white">
                      <v-card-title style="font-family: Poppins;"
                        class="text-pre-wrap ma-6" v-html="item.content"> </v-card-title>

                      <v-row>
                        <v-col cols="6">
                          <!--Each button is connected to the validateResult funtion. The button can only trigger the function once, so that the user cannot gain points over and over again by selecting the right answer. -->
                          <v-btn color="#4E8D9C" style="font-family: Poppins; width: 35vw; height: 4vh; color: white;"

            </v-container>
          </div>

        </template>

        <div class="d-flex justify-center align-center" style="min-height: 100vh;">
          <v-card v-if="gameComplete" style="width: 85vw; height: 70vh;" class="text-center">
            <v-card-title style="font-family: Poppins; font-size: 2.5vw; color: #4E8D9C;">Experience
              Completed!</v-card-title>
            <v-card-text style="font-family: Poppins; font-size: 2vw; color: #281C59;">Well done. You're one step closer
